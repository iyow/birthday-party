<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 蟹老板的3D生日派对漫游 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 100;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            max-width: 600px;
        }

        .btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        #score {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }

        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="loading">🎂 加载生日派对中...</div>
        
        <div id="ui">
            <h3>🎂 蟹老板生日漫游</h3>
            <div>收集的金币: <span id="score">0</span></div>
            <div>找到的礼物: <span id="gifts">0</span>/5</div>
        </div>

        <div id="controls">
            <button id="reset-camera" class="btn">重置视角</button>
            <button id="toggle-wireframe" class="btn">切换线框</button>
        </div>

        <div id="instructions">
            <h3>🎮 游戏说明</h3>
            <p>🎯 <strong>目标：</strong>在3D生日派对中收集金币和礼物</p>
            <p>🎮 <strong>控制：</strong>WASD移动，鼠标控制视角，空格跳跃</p>
            <p>🎁 <strong>任务：</strong>找到5个生日礼物，收集更多金币获得高分！</p>
            <button id="start-game" class="btn">开始漫游</button>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/CapsuleGeometry.js"></script>
    
    <script src="roaming-game.js"></script>
</body>
</html>
